<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon compte - Success Story by SNEP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pages.css">
</head>
<body>
    <div class="page-shell has-glow">
        <header class="page-header">
            <a href="index.html" class="logo-static">
                <img src="src/LogoSite.svg" alt="Success Story by SNEP">
            </a>
        </header>

        <main class="page-main account-main">

            <!-- SALUTATION -->
            <div class="account-greeting-wrap">
                <p class="account-greeting">Bonjour, <strong id="user-name"></strong></p>
            </div>

            <!-- COMMANDES RÉCENTES -->
            <section class="account-block">
                <div class="account-block-header">
                    <h2 class="account-section-title">Vos commandes récentes</h2>
                    <p class="account-section-sub">Retrouvez ici vos derniers disques commandés</p>
                </div>
                <div class="carousel-wrap">
                    <div class="carousel-track" id="carousel-track">
                        <figure class="carousel-slide">
                            <img src="src/artiste-alicante.jpg" alt="Alicante">
                        </figure>
                        <figure class="carousel-slide">
                            <img src="src/artiste-gmk.jpg" alt="GMK">
                        </figure>
                    </div>
                </div>
            </section>

            <!-- COMMANDES EN COURS -->
            <section class="account-block">
                <div class="account-block-header">
                    <h2 class="account-section-title">Vos commandes en cours</h2>
                </div>
                <div class="orders-grid" id="orders-grid"></div>
            </section>

            <!-- VITRINE PLEIN-BLEED -->
            <section class="account-vitrine">
                <div class="account-vitrine-strip">
                    <figure class="account-vitrine-col">
                        <img src="src/artiste-alicante.jpg" alt="Vitrine 1">
                        <div class="account-vitrine-overlay">
                            <img class="account-vitrine-logo" onerror="this.style.display='none'" src="src/karmen.svg" alt="Karmen">
                        </div>
                    </figure>
                    <figure class="account-vitrine-col">
                        <img src="src/artiste-gmk.jpg" alt="Vitrine 2">
                        <div class="account-vitrine-overlay">
                            <img class="account-vitrine-logo" onerror="this.style.display='none'" src="src/wixola2s.svg" alt="GMK">
                        </div>
                    </figure>
                    <figure class="account-vitrine-col">
                        <img src="src/artiste-capitale-du-crime.jpg" alt="Vitrine 3">
                        <div class="account-vitrine-overlay">
                            <img class="account-vitrine-logo" onerror="this.style.display='none'" src="src/himra.svg" alt="Capitale du Crime">
                        </div>
                    </figure>
                    <figure class="account-vitrine-col">
                        <img src="src/artiste-balade.jpg" alt="Vitrine 4">
                        <div class="account-vitrine-overlay">
                            <img class="account-vitrine-logo" onerror="this.style.display='none'" src="src/vacra.svg" alt="Vacra">
                        </div>
                    </figure>
                </div>
                <a href="vitrine.html?ref=compte" class="btn-solid account-vitrine-cta">Voir la vitrine</a>
            </section>

        </main>

        <footer class="site-footer">
            <a href="index.html" class="logo-footer">
                <img src="src/LogoSite.svg" alt="Success Story by SNEP">
            </a>
            <nav>
                <a href="#">CGV</a>
                <a href="#">CGU</a>
                <a href="#">Cookies</a>
            </nav>
        </footer>
    </div>

    <script src="pages.js"></script>
    <script>
        const savedName = localStorage.getItem('ss_user_name');
        if (savedName) document.getElementById('user-name').textContent = savedName;
        const params = new URLSearchParams(window.location.search);
        const commandeEnCours = params.get('commande');
        const grid = document.getElementById('orders-grid');

        if (commandeEnCours) {
            const commandeImage = localStorage.getItem('ss_commande_image');
            grid.innerHTML = `
                <div class="order-card is-pending">
                    ${commandeImage ? `<img src="${commandeImage}" alt="${commandeEnCours}">` : ''}
                    <span class="order-name">"${commandeEnCours}"</span>
                    <span class="order-status">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M12 7v5l3.5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        En cours
                    </span>
                </div>
                <a href="nouvelle-commande.html" class="order-card-empty">
                    <span class="plus-circle">+</span>
                </a>
            `;
        } else {
            grid.innerHTML = `
                <a href="nouvelle-commande.html" class="order-card-empty" style="grid-column: 1 / -1;">
                    <span class="plus-circle">+</span>
                </a>
            `;
        }

        // Carrousel
        const track = document.getElementById('carousel-track');
        const nextBtn = document.getElementById('carousel-next');
        let current = 0;
        const slides = track.querySelectorAll('.carousel-slide');
        const total = slides.length;

        nextBtn && nextBtn.addEventListener('click', () => {
            current = (current + 1) % total;
            track.style.transform = `translateX(calc(-${current} * (var(--slide-w) + var(--slide-gap))))`;
        });
    </script>
</body>
</html>
