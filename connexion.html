<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Success Story by SNEP</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pages.css">
</head>
<body>

    <div class="page-shell has-bars screen-fit">
        <div class="bars-clip">
            <div class="bars-bg"></div>
            <div class="bars-vignette"></div>
        </div>

        <header class="page-header">
            <a href="index.html" class="logo-static">
                <img src="src/LogoSite.svg" alt="Success Story by SNEP">
            </a>
        </header>

        <main class="page-main login-shell">
            <h1 class="page-title login-title">Entrez votre <span class="accent">identifiant</span></h1>

            <form id="login-form" novalidate class="login-form">
                <div class="otp-group" id="otp-group">
                    <input class="otp-input" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off">
                    <input class="otp-input" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off">
                    <input class="otp-input" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off">
                    <input class="otp-input" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off">
                    <input class="otp-input" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off">
                    <input class="otp-input" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off">
                </div>
                <input type="hidden" id="login-identifiant" data-required>

                <div class="cta-center login-cta">
                    <button type="submit" id="login-submit" class="btn-link full-accent is-disabled">
                        Se connecter
                    </button>
                </div>

                <a href="temoignage.html" class="login-helper">Vous n'en avez pas encore ?</a>
            </form>
        </main>

        <footer class="site-footer">
            <a href="index.html" class="logo-footer">
                <img src="src/LogoSite.svg" alt="Success Story by SNEP">
            </a>
            <nav>
                <a href="#">CGV</a>
                <a href="#">CGU</a>
                <a href="#">Cookies</a>
            </nav>
        </footer>
    </div>

    <script src="pages.js"></script>
    <script>
        const inputs = Array.from(document.querySelectorAll('.otp-input'));
        const hidden = document.getElementById('login-identifiant');
        const btn = document.getElementById('login-submit');

        // Focus auto sur la première case
        inputs[0].focus();

        const sync = () => {
            const val = inputs.map(i => i.value).join('');
            hidden.value = val;
            btn.classList.toggle('is-disabled', val.length < 6);
        };

        inputs.forEach((input, i) => {
            input.addEventListener('input', (e) => {
                // N'accepte que les chiffres
                input.value = input.value.replace(/\D/g, '').slice(-1);
                if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
                sync();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && i > 0) {
                    inputs[i - 1].focus();
                    inputs[i - 1].value = '';
                    sync();
                }
            });

            // Permet de coller un code à 6 chiffres d'un coup
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
                paste.split('').forEach((char, j) => {
                    if (inputs[j]) inputs[j].value = char;
                });
                inputs[Math.min(paste.length, inputs.length - 1)].focus();
                sync();
            });
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (btn.classList.contains('is-disabled')) return;
            window.location.href = 'compte.html';
        });
    </script>
</body>
</html>
