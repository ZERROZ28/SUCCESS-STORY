<!DOCTYPE html>
<html lang="fr">
<head>

<body>

    <div class="page-shell has-ambient-glow screen-fit">

    <script>
        // Génère un identifiant à 6 chiffres, comme dans la maquette (096324).
        document.getElementById('identifiant-value').textContent =
