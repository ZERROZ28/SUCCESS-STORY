<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre vitrine - Success Story by SNEP</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pages.css">
</head>
<body>

    <div class="page-shell has-ambient-glow">
        <header class="page-header has-action">
            <a href="index.html" class="logo-static">
                <img src="src/LogoSite.svg" alt="Success Story by SNEP">
            </a>
            <a href="temoignage.html" class="header-action">Prendre contact</a>
        </header>

        <main class="page-main vitrine-page-main">
            <h1 class="vitrine-page-title">Notre <span>vitrine</span></h1>

            <div class="vitrine-grid">
                <figure class="vitrine-tile">
                    <img src="src/artiste-alicante.jpg" alt="Disque Alicante remis à l'artiste">
                    <div class="vitrine-tile-overlay">
                        <img class="vitrine-tile-logo" onerror="this.style.display='none'" src="src/karmen.svg" alt="logo">
                        <p class="vitrine-tile-text">Disque d'or pour "Alicante"</p>
                    </div>
                </figure>
                <figure class="vitrine-tile">
                    <img src="src/artiste-gmk.jpg" alt="Disque GMK remis aux artistes">
                    <div class="vitrine-tile-overlay">
                        <img class="vitrine-tile-logo" onerror="this.style.display='none'" src="src/wixola2s.svg" alt="logo">
                        <p class="vitrine-tile-text">Disque d'or pour "GMK"</p>
                    </div>
                </figure>
                <figure class="vitrine-tile">
                    <img src="src/artiste-capitale-du-crime.jpg" alt="Disque Capitale du Crime remis sur scène">
                    <div class="vitrine-tile-overlay">
                        <img class="vitrine-tile-logo" onerror="this.style.display='none'" src="src/himra.svg" alt="logo">
                        <p class="vitrine-tile-text">Disque d'or pour "Capitale du crime vol.2"</p>
                    </div>
                </figure>
                <figure class="vitrine-tile">
                    <img src="src/artiste-balade.jpg" alt="Disque Balade remis sur scène">
                    <div class="vitrine-tile-overlay">
                        <img class="vitrine-tile-logo" onerror="this.style.display='none'" src="src/vacra.svg" alt="logo">
                        <p class="vitrine-tile-text">Disque de diamant pour "Balade"</p>
                    </div>
                </figure>
                <figure class="vitrine-tile">
                    <img src="src/artiste-lafouineDisque.jpg" alt="Disque Flying Blue remis à l'artiste">
                    <div class="vitrine-tile-overlay">
                        <img class="vitrine-tile-logo" onerror="this.style.display='none'" src="src/lafouine.svg" alt="logo">
                        <p class="vitrine-tile-text">Disque d'or pour "Flying blue"</p>
                    </div>
                </figure>
                <figure class="vitrine-tile">
                    <img src="src/artiste-rk.jpg" alt="Disque pour RK remis à l'artiste et au compositeur">
                    <div class="vitrine-tile-overlay">
                        <img class="vitrine-tile-logo" onerror="this.style.display='none'" src="src/rk.svg" alt="logo">
                        <p class="vitrine-tile-text">Disque de diamant pour "Viano" et "Sale état"</p>
                    </div>
                </figure>
            </div>
        </main>

        <footer class="site-footer">
            <a href="index.html" class="logo-footer">
                <img src="src/LogoSite.svg" alt="Success Story by SNEP">
            </a>
            <nav>
                <a href="#">CGV</a>
                <a href="#">CGU</a>
                <a href="#">Cookies</a>
            </nav>
        </footer>
    </div>

    <script>
        if (new URLSearchParams(window.location.search).get('ref') === 'compte') {
            const headerAction = document.querySelector('.header-action');
            if (headerAction) {
                headerAction.textContent = 'Mon compte';
                headerAction.href = 'compte.html';
            }
        }
    </script>

</body>
</html>
